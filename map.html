<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>原産地マップ</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/1.6.9/topojson.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/datamaps/0.5.9/datamaps.world.min.js"></script>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background-color: #f6faf6;
      font-family: sans-serif;
    }

    .map-page {
      max-width: 1100px;
      margin: 40px auto;
      background-color: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #2f5f4f;
      text-decoration: none;
      font-weight: bold;
    }

    #map {
      width: 100%;
      height: 560px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background-color: white;
      overflow: hidden;
    }

    #plantName {
      color: #2f5f4f;
      margin-bottom: 10px;
    }

    #originText {
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="map-page">
    <a class="back-link" href="index.html">← 図鑑に戻る</a>

    <h1 id="plantName">原産地マップ</h1>
    <p id="originText"></p>

    <div id="map"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plantId = Number(params.get("id"));

    fetch("data/plants.json")
      .then(response => response.json())
      .then(plants => {
        const plant = plants.find(p => p.id === plantId);

        if (!plant) {
          document.getElementById("plantName").textContent = "植物が見つかりません";
          return;
        }

        document.getElementById("plantName").textContent = plant.name + " の原産地";
        document.getElementById("originText").textContent =
          "原産地：" + plant.originText;

        const mapData = {};

        plant.originLocations.forEach(location => {
          if (location.countryCode) {
            mapData[location.countryCode] = {
              fillKey: "origin"
            };
          }
        });

        const map = new Datamap({
          element: document.getElementById("map"),
          projection: "mercator",

          fills: {
            defaultFill: "#f2f2f2",
            origin: "#e53935"
          },

          data: mapData,

          geographyConfig: {
            borderColor: "#333333",
            borderWidth: 0.6,

            // カーソルを乗せても色を変えない
            highlightOnHover: false,
            
            popupTemplate: function(geo, data) {
              return '<div class="hoverinfo">' + geo.properties.name + '</div>';
            }
          }
        });

        window.addEventListener("resize", function() {
          map.resize();
        });
      });
  </script>
</body>
</html>
